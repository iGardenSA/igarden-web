<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iGarden — بروفايل الشركة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1F3A2A; }
        * { box-sizing: border-box; }
    </style>
</head>
<body>
<div style="position: relative; width: 1280px; height: 720px; overflow: hidden; background-color: #1F3A2A;">

    <!-- Decorative circles -->
    <div style="position: absolute; left: -120px; top: -120px; width: 420px; height: 420px; border-radius: 50%; border: 60px solid rgba(111,166,52,0.08);"></div>
    <div style="position: absolute; right: -80px; bottom: -80px; width: 340px; height: 340px; border-radius: 50%; border: 50px solid rgba(111,166,52,0.06);"></div>
    <div style="position: absolute; right: 320px; top: -60px; width: 200px; height: 200px; border-radius: 50%; border: 30px solid rgba(111,166,52,0.05);"></div>

    <!-- Green accent bar top -->
    <div style="position: absolute; left: 0; top: 0; width: 1280px; height: 5px; background: linear-gradient(90deg, #6FA634, #A5D63F);"></div>

    <!-- Logo -->
    <div style="position: absolute; left: 64px; top: 40px;">
        <img src="/logo/icon-master-original.png" alt="iGarden" style="width: 72px; height: 72px; object-fit: contain;">
    </div>

    <!-- Tag top right -->
    <div style="position: absolute; right: 64px; top: 52px; background: rgba(111,166,52,0.18); border: 1px solid rgba(111,166,52,0.35); border-radius: 20px; padding: 6px 20px;">
        <span style="font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 600; color: #A5D63F;">بروفايل الشركة · 2026</span>
    </div>

    <!-- Main content -->
    <div style="position: absolute; left: 64px; top: 50%; transform: translateY(-50%); width: 700px;">
        <div style="width: 48px; height: 4px; background: #6FA634; border-radius: 2px; margin-bottom: 28px;"></div>
        <h1 style="font-family: 'Tajawal', sans-serif; font-size: 64px; font-weight: 700; color: #FFFFFF; margin: 0 0 16px; line-height: 1.1;">
            الحديقة الذكية
        </h1>
        <h2 style="font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 600; color: #6FA634; margin: 0 0 24px; letter-spacing: -0.5px;">
            iGarden
        </h2>
        <p style="font-family: 'Tajawal', sans-serif; font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.75); margin: 0 0 40px; line-height: 1.6;">
            شركة سعودية لتطوير المزارع وأنظمة التحكم الزراعي الذكي
        </p>
        <div style="display: flex; gap: 16px; align-items: center;">
            <div style="background: #6FA634; border-radius: 8px; padding: 10px 24px;">
                <span style="font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 700; color: #FFFFFF;">ننفّذ · نُوطّن · نُطوّر</span>
            </div>
            <span style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.4);">منذ 2024</span>
        </div>
    </div>

    <!-- Right visual block -->
    <div style="position: absolute; right: 64px; top: 50%; transform: translateY(-50%); width: 380px;">
        <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(111,166,52,0.2); border-radius: 16px; padding: 32px; display: flex; flex-direction: column; gap: 20px;">
            <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 20px;">
                <div style="font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 700; color: #6FA634;">3+</div>
                <div style="font-family: 'Tajawal', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 4px;">سنوات من التطوير</div>
            </div>
            <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 20px;">
                <div style="font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 700; color: #6FA634;">4</div>
                <div style="font-family: 'Tajawal', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 4px;">عملاء صناعيون</div>
            </div>
            <div>
                <div style="font-family: 'Inter', sans-serif; font-size: 36px; font-weight: 700; color: #6FA634;">95%</div>
                <div style="font-family: 'Tajawal', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 4px;">توفير مياه</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div style="position: absolute; bottom: 0; left: 0; width: 1280px; height: 44px; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; padding: 0 64px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3);">Intelligent Garden Company · MISA #24926249716</span>
        <span style="font-family: 'Tajawal', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3);">igarden.sa</span>
    </div>

    <!-- Slide num -->
    <div style="position: absolute; left: 64px; bottom: 12px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.25);">01 / 08</span>
    </div>
</div>
</body></html>
